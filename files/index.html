<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasky — Todo App</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>
<body>

  <div class="noise"></div>

  <main>
    <header>
      <div class="header-top">
        <span class="logo-mark">✦</span>
        <h1>Tasky</h1>
      </div>
      <p class="subtitle">What needs to get done?</p>
    </header>

    <!-- ADD FORM -->
    <div class="form-card">
      <div class="form-row">
        <input type="text" id="task-input" placeholder="Add a new task..." autocomplete="off" />
        <input type="date" id="due-input" />
        <button id="add-btn">Add</button>
      </div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>

    <!-- TASK LIST -->
    <div id="task-list" class="task-list">
      <div class="empty-state" id="empty-state">
        <span>✦</span>
        <p>No tasks yet. Add one above!</p>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <span id="stats-text">0 tasks</span>
      <button id="clear-done-btn">Clear done</button>
    </div>
  </main>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>Edit Task</h2>
      <input type="text" id="edit-task-input" placeholder="Task name..." />
      <input type="date" id="edit-due-input" />
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="btn-secondary">Cancel</button>
        <button id="modal-save-btn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
