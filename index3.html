<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Quick Task Dashboard</title>
</head>
<body>
  <div id="app">
    <input type="text" id="taskInput" placeholder="Enter task name...">
    <button id="addBtn">Add Task</button>
    
    <ul id="taskList"></ul>
    
    <button id="clearBtn">Clear All</button>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const clearBtn = document.getElementById('clearBtn');

    let taskStorage = JSON.parse(localStorage.getItem('taskStorage')) || [];

    loadTask();

    addBtn.addEventListener('click', addTask);
    clearBtn.addEventListener('click', clearStorage);

    function clearStorage() {
      localStorage.removeItem('taskStorage');
      taskList.textContent = '';
    }

    function addTask() {
      if (taskInput.value.trim() === '') return taskList.textContent = 'Add Task';

      const li = document.createElement('li');
      li.textContent = taskInput.value;
      taskList.appendChild(li);

      deleteTask(li, taskInput.value)

      taskStorage.push(taskInput.value);
      saveTask();
      taskInput.value = '';

    }

    function deleteTask(li, inputTask) {
      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      li.appendChild(deleteBtn);

      deleteBtn.addEventListener('click', () => {
        removeTask(li, inputTask)
      });
    }

    function removeTask(li, inputTask) {
      taskStorage = taskStorage.filter(task => task !== inputTask);
      saveTask();
      li.remove();
    }

    function saveTask() {
      localStorage.setItem('taskStorage',JSON.stringify(taskStorage));
    }

    function loadTask() {
      taskStorage.forEach(task => {
        const li = document.createElement('li');
        li.textContent = task;
        deleteTask(li, task);
        taskList.appendChild(li);
      });
    }

  </script>
</body>
</html>
