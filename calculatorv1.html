<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator v1</title>
</head>
<body>
  <div id="js-result"></div>
  <button data-value="clear">C</button>
  <button data-value="/">/</button>
  <button data-value="*">*</button>
  <button data-value="-">-</button>
  <button data-value="9">9</button>
  <button data-value="8">8</button>
  <button data-value="7">7</button>
  <button data-value="6">6</button>
  <button data-value="5">5</button>
  <button data-value="4">4</button>
  <button data-value="3">3</button>
  <button data-value="2">2</button>
  <button data-value="1">1</button>
  <button data-value="0">0</button>
  <button data-value="+">+</button>
  <button data-value="=">=</button>

  <script>
    let operator = '';
    let currentInput = '';
    let previousInput = '';

    const displayResult = document.getElementById('js-result');
    const buttons = document.querySelectorAll('button');

    buttons.forEach(button => {
      button.addEventListener('click', () => buttonValue(button))
    });

    function buttonValue(button) {
      const value = button.getAttribute('data-value');
      if (value === 'clear') {
        operator = '';
        currentInput = '';
        previousInput = '';
        displayResult.textContent = '';
      } else if (value === '=') {
        displayResult.textContent = eval(`${previousInput} ${operator} ${currentInput}`);
        currentInput = '';
        previousInput = '';
        operator = '';
      }else if (value === '*' || value === '/' || value === '+' || value === '-') {
        operator = value;
        previousInput += currentInput + operator;
        displayResult.textContent = `${previousInput}`;
        currentInput = '';
      }else {
        currentInput += value
        displayResult.textContent = `${currentInput}`;
      }
    }

  </script>
</body>
</html>
