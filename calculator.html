<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator App</title>
</head>
<body>
  <div id="js-result"></div>
  <button data-value="clear">C</button>
  <button data-value="/">/</button>
  <button data-value="*">*</button>
  <button data-value="-">-</button>
  <button data-value="9">9</button>
  <button data-value="8">8</button>
  <button data-value="7">7</button>
  <button data-value="6">6</button>
  <button data-value="5">5</button>
  <button data-value="4">4</button>
  <button data-value="3">3</button>
  <button data-value="2">2</button>
  <button data-value="1">1</button>
  <button data-value="0">0</button>
  <button data-value="+">+</button>
  <button data-value="=">=</button>

  <script>
    let currentInput = '';
    let operator = '';
    let previousInput = '';

    const display = document.getElementById('js-result');
    const buttons = document.querySelectorAll('button');

    buttons.forEach(function(button) {
      button.addEventListener('click', function() {
        const value = button.getAttribute('data-value');
        if (value === 'clear') {
          // i-reset lahat
          currentInput = '';
          operator = '';
          previousInput = '';
          display.textContent = 0;
        } else if (value === '=') {
          display.textContent = eval(`${previousInput} ${operator} ${currentInput}`)
        } else if (value === '+' || value === '-' || value === '*' || value === '/') {
          operator = value;
          previousInput = currentInput; // ← ilipat
          currentInput = '';             // ← i-reset para sa next number
        } else {
          // number — i-add sa currentInput
          currentInput = currentInput + value; // ← i-append ang bagong number
          display.textContent = currentInput;  // ← ipakita sa display
        }
      });
    });
    
  </script>

</body>
</html>
